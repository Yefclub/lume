name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Versões em sincronia (package.json / tauri.conf / Cargo.toml)
        run: node scripts/check-versions.mjs
      - run: pnpm build

  rust:
    name: Core Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependências de sistema do Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            cmake \
            clang \
            libclang-dev
      - name: Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: false
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - name: Pré-compilar llama.cpp (retry shaders Vulkan)
        run: |
          for i in 1 2 3 4 5; do
            cargo build --manifest-path src-tauri/Cargo.toml -p llama-cpp-sys-2 && break
            echo "::warning::retry llama-cpp-sys $i"; sleep 5
          done
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
