name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve:
    name: Resolver tag/versão
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            V=$(node -p "require('./package.json').version")
            echo "tag=v$V" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.platform }})
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04 # AppImage com glibc mais compatível
            args: ""
          - platform: windows-latest # .exe (NSIS) + .msi
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Dependências de sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      - name: Build + publicar instaladores
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.resolve.outputs.tag }}
          releaseName: "Lume ${{ needs.resolve.outputs.tag }}"
          releaseBody: |
            Instaladores gerados automaticamente pelo CI.

            - **Windows:** `.exe` (instalador NSIS) ou `.msi`
            - **macOS (Apple Silicon):** `.dmg`
            - **Linux:** `.AppImage` ou `.deb`

            ⚠️ Binários **não assinados** (Fase 0) — o SmartScreen (Windows) ou o
            Gatekeeper (macOS) pode avisar na primeira execução. Code signing virá depois.
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
