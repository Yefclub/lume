name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve:
    name: Resolver tag/versão
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            V=$(node -p "require('./package.json').version")
            echo "tag=v$V" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.platform }})
    needs: resolve
    strategy:
      fail-fast: false
      # Serializa os 3 OS: evita race ao mesclar o latest.json (senão uma
      # plataforma some do updater, quebrando o auto-update).
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04 # AppImage com glibc mais compatível
            args: ""
          - platform: windows-latest # .exe (NSIS) + .msi
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Dependências de sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            cmake \
            clang \
            libclang-dev
      - name: Dependências de sistema (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install cmake
      - name: LIBCLANG_PATH (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"

      # GPU: Vulkan no Windows/Linux (macOS usa Metal, nativo — não precisa).
      - name: Vulkan SDK
        if: matrix.platform != 'macos-latest'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: false
          cache: true

      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      # O build dos shaders Vulkan é flaky em paralelo — pré-compila com retry
      # para o tauri-action reaproveitar o llama-cpp-sys já compilado.
      - name: Pré-compilar llama.cpp (retry shaders)
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            cargo build --release --manifest-path src-tauri/Cargo.toml ${{ matrix.args }} -p llama-cpp-sys-2 && break
            echo "::warning::retry llama-cpp-sys $i"; sleep 5
          done

      - name: Nota de release (Novidades)
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.tag }}"
          FILE="release-notes/${TAG}.md"
          if [ -f "$FILE" ]; then
            BODY=$(node -e "let s=require('fs').readFileSync(process.argv[1],'utf8').replace(/^﻿/,'');s=s.replace(/^---[\s\S]*?\n---\s*/,'');process.stdout.write(s.trim())" "$FILE")
          else
            BODY="Instaladores gerados automaticamente pelo CI."
          fi
          {
            echo "body<<__LUME_EOF__"
            echo "$BODY"
            echo ""
            echo "---"
            echo "⚠️ Binários sem code signing do SO (fase inicial): o SmartScreen (Windows) ou o Gatekeeper (macOS) pode avisar na primeira execução. As atualizações automáticas são assinadas (updater)."
            echo "__LUME_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build + publicar instaladores (assinados p/ updater)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # llama.cpp usa std::filesystem (C++17) — exige macOS 10.15+.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        with:
          tagName: ${{ needs.resolve.outputs.tag }}
          releaseName: "Lume ${{ needs.resolve.outputs.tag }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
