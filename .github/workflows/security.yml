name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # toda segunda, 06:00 UTC

jobs:
  gitleaks:
    name: Segredos (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_LICENSE: ""

  cargo-audit:
    name: Vulnerabilidades de crates (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Instalar cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit --file src-tauri/Cargo.lock
