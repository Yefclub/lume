name: 🐛 Bug
description: Relatar um comportamento incorreto
labels: [bug]
body:
  - type: textarea
    id: o-que
    attributes:
      label: O que aconteceu?
      description: Descreva o bug e o que você esperava que acontecesse.
    validations:
      required: true
  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Abrir o Lume
        2. ...
    validations:
      required: true
  - type: input
    id: versao
    attributes:
      label: Versão do Lume
      placeholder: v0.1.0
  - type: dropdown
    id: os
    attributes:
      label: Sistema operacional
      options:
        - Windows
        - macOS
        - Linux
  - type: textarea
    id: extra
    attributes:
      label: Logs / contexto adicional
