name: ✨ Feature
description: Sugerir uma funcionalidade
labels: [enhancement]
body:
  - type: textarea
    id: problema
    attributes:
      label: Problema / motivação
      description: Que necessidade isso resolve?
    validations:
      required: true
  - type: textarea
    id: proposta
    attributes:
      label: Proposta
    validations:
      required: true
  - type: textarea
    id: alternativas
    attributes:
      label: Alternativas consideradas
