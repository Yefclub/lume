version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns:
          - "react*"
          - "@vitejs/*"
          - "vite"
          - "typescript"
          - "@types/*"
          - "tailwind*"
          - "@tailwindcss/*"
      tauri-js:
        patterns:
          - "@tauri-apps/*"

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns:
          - "tauri*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
